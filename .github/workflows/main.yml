name: Workflow to deploy container images in kubernetes clusters using Argo CD

on:
  push:
    branches:
      - main

env:
  APP_DIR: app
  DOCKER_IMAGE: devenops641/tales-of-china

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Optional unless you later use kubectl/aws in this job
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Docker Image 
        run: |
          set -euxo pipefail
          cd "$APP_DIR"
          docker build -t "$DOCKER_IMAGE:${GITHUB_SHA}" .
          docker tag  "$DOCKER_IMAGE:${GITHUB_SHA}" "$DOCKER_IMAGE:${GITHUB_RUN_NUMBER}"
          docker tag  "$DOCKER_IMAGE:${GITHUB_SHA}" "$DOCKER_IMAGE:latest"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image (SHA, RUN_NUMBER, latest)
        run: |
          set -euxo pipefail
          docker push "$DOCKER_IMAGE:${GITHUB_SHA}"
          docker push "$DOCKER_IMAGE:${GITHUB_RUN_NUMBER}"
          docker push "$DOCKER_IMAGE:latest"

      - name: Update deployment manifest with image tag (Run Number)
        run: |
          set -euxo pipefail
          git config user.email "devenop641@gmail.com"
          git config user.name  "devenops641"

          IMAGE_TAG="${GITHUB_RUN_NUMBER}"   # define before use

          
          sed -i "s/replaceImageTag/${iMAGE_TAG}/g" k8s-manifests/deployment.yaml

          git add k8s-manifests/deployment.yaml
          if ! git diff --cached --quiet; then
            git commit -m "Update deployment image to ${BUILD_NUMBER}"
            git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" HEAD:main
          else
            echo "No changes detected; skipping commit and push."
          fi

     