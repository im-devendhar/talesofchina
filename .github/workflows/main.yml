name: Workflow to deploy container images in kubernetes clusters using Argo CD

on:
  push:
    branches:
      - main

env:
  APP_DIR: app
  DOCKER_IMAGE: devenops641/tales-of-china

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Docker Image
        run: |
          set -euxo pipefail
          cd "$APP_DIR"
          docker build -t "$DOCKER_IMAGE:${{ github.sha }}" .
          docker tag "$DOCKER_IMAGE:${{ github.sha }}" "$DOCKER_IMAGE:latest"
          docker tag "$DOCKER_IMAGE:${{ github.sha }}" "$DOCKER_IMAGE:${GITHUB_RUN_NUMBER}"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          set -euxo pipefail
          docker push $DOCKER_IMAGE:${{ github.sha }}
          docker push $DOCKER_IMAGE:${GITHUB_RUN_NUMBER}
          docker push $DOCKER_IMAGE:latest

      - name: Update deployment manifest with image tag (SHA)
        run: |
          set -euxo pipefail
          git config user.email "devenop641@gmail.com"
          git config user.name "devenops641"
          IMAGE_TAG="${GITHUB_SHA}"
          sed -i "s/replaceImageTag/${IMAGE_TAG}/g" k8s-manifests/deployment.yaml
          git add k8s-manifests/deployment.yaml
          if ! git diff --cached --quiet; then
            git commit -m "Update deployment image to ${IMAGE_TAG}"
            git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" HEAD:main
          else
            echo "No changes detected; skipping commit and push."
          fi