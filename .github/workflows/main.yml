name: Workflow to deploy container images in kubernetes clusters using Argo CD

on:
  push:
    branches:
      - main

env:
  APP_DIR: app
  DOCKER_IMAGE: devenops641/tales-of-china

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Docker Image
        run: |
          cd $APP_DIR
          docker build -t $DOCKER_IMAGE:${{ github.sha }} .
          docker tag $DOCKER_IMAGE:${{ github.sha }} $DOCKER_IMAGE:latest

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push $DOCKER_IMAGE:${{ github.sha }}
          docker push $DOCKER_IMAGE:latest
      - name: Update deployment manifest with image tag
        run: |
            git config user.email "devenop641@gmail.com"
            git config user.name "devenops641"
            BUILD_NUMBER=${GITHUB_RUN_NUMBER}
            sed -i "s/replaceImageTag/${BUILD_NUMBER}/g" talesofchina/k8s-manifests/deployment.yaml
            git add talesofchina/k8s-manifests/deployment.yaml
            git commit -m "Update deployment image to version ${BUILD_NUMBER}" || echo "No changes to commit"
            git push https://${{ github.actor }}:${{ secrets.TOKEN }}@github.com/${{ github.repository }} HEAD:main
